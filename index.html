<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
width:100vw;
overflow:hidden;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

/* VIDEO BACKGROUND */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.25; /* faded video */
z-index:-1;
}

/* CONTENT */

.container{
text-align:center;
z-index:10;
}

/* DAYS */

.days{
font-size:280px;
font-weight:900;
line-height:1;
text-shadow:
0px 4px 10px rgba(0,0,0,0.7),
0px 0px 40px rgba(255,255,255,0.3);
}

/* LABEL */

.label{
font-size:80px;
margin-bottom:40px;
letter-spacing:8px;
font-weight:bold;
}

/* TIME */

.time{
font-size:140px;
font-weight:bold;
letter-spacing:12px;
text-shadow:
0px 4px 10px rgba(0,0,0,0.7),
0px 0px 20px rgba(255,255,255,0.2);
line-height:1;
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted></video>

<div class="container">

<div class="label">DAYS LEFT</div>
<div class="days" id="days">0</div>

<div class="label">TOTAL TIME LEFT</div>
<div class="time" id="time">00:00:00</div>

</div>


<script>

/* FINAL DATE */
const finalDate = new Date("April 26, 2026 00:00:00").getTime();

/* COUNTDOWN */

function updateCountdown(){

const now = new Date().getTime();
const diff = finalDate - now;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff % (1000*60*60))/(1000*60));
const seconds = Math.floor((diff % (1000*60))/1000);

document.getElementById("days").innerText = days;
document.getElementById("time").innerText =
String(hours).padStart(2,"0")+":"+
String(minutes).padStart(2,"0")+":"+
String(seconds).padStart(2,"0");

}

setInterval(updateCountdown,1000);
updateCountdown();


/* VIDEO LOOP */

const videos = [

"videos/video1.mp4"
];

let index = 0;
const videoPlayer = document.getElementById("bgVideo");

function playNextVideo(){

videoPlayer.src = videos[index];
videoPlayer.play();

index++;

if(index >= videos.length){
index = 0;
}

}

videoPlayer.addEventListener("ended", playNextVideo);

playNextVideo();

</script>

</body>
</html>
